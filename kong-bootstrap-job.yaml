apiVersion: batch/v1
kind: Job
metadata:
  name: kong-bootstrap
spec:
  template:
    spec:
      containers:
        - name: kong-bootstrap
          image: "kong/kong-gateway:3.13.0.2"
          imagePullPolicy: IfNotPresent
          command: [ "kong", "migrations", "bootstrap" ]
          env:
            - name: KONG_DATABASE
              value: "postgres"
            - name: KONG_PG_HOST
              value: "kong-ee-database-postgresql" # Finds the Postgres Service
            - name: KONG_PG_DATABASE
              value: "kong"
            - name: KONG_PG_USER
              value: "kong"
            - name: KONG_PG_PASSWORD
              value: "kong"
            - name: KONG_PASSWORD
              value: "handyshake"
      restartPolicy: OnFailure